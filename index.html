<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>For Angela ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#f7e7e3,#fff8f6);color:#5b3d3d;min-height:100vh;overflow-x:hidden}
.container{max-width:1000px;margin:0 auto;padding:40px 20px 60px;text-align:center;position:relative;z-index:1}
.title{font-size:3rem;color:#c25b73;margin-bottom:10px}
.subtitle{opacity:.8;margin-bottom:30px}
.photo{width:290px;max-width:90%;height:370px;object-fit:cover;border-radius:25px;box-shadow:0 10px 30px rgba(0,0,0,.18);margin-bottom:30px}
.slideshow{position:relative;width:900px;max-width:100%;height:420px;margin:0 auto 30px}
.slide{position:absolute;top:0;left:50%;width:280px;height:380px;object-fit:cover;border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.18);opacity:0;transform:translateX(-50%) scale(.85);
transition:all 1.5s ease}
.slide.active{opacity:1;transform:translateX(-50%) scale(1);z-index:3}
.slide.prev{opacity:.65;transform:translateX(calc(-50% - 260px)) scale(.9);z-index:2}
.slide.next{opacity:.65;transform:translateX(calc(-50% + 260px)) scale(.9);z-index:2}
@media (max-width: 768px){
  .slideshow{height:360px}
  .slide{width:220px;height:320px}
  .slide.prev{transform:translateX(calc(-50% - 120px)) scale(.85)}
  .slide.next{transform:translateX(calc(-50% + 120px)) scale(.85)}
}

.letter{max-width:800px;margin:0 auto;background:rgba(255,255,255,.65);padding:35px;border-radius:30px;backdrop-filter:blur(10px);box-shadow:0 8px 25px rgba(0,0,0,.08);text-align:left;line-height:2;font-size:1.08rem;min-height:220px}
.cursor{display:inline-block;animation:blink .8s infinite;color:#c25b73;font-weight:700}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
.music-btn{margin-top:30px;padding:14px 28px;border:none;border-radius:999px;background:#ff7f9d;color:#fff;font-size:1rem;cursor:pointer;box-shadow:0 8px 20px rgba(255,127,157,.35)}
footer{margin-top:40px;opacity:.75}
.hearts{position:fixed;inset:0;overflow:hidden;pointer-events:none}
.heart{position:absolute;bottom:-30px;color:#ff9bb2;animation:floatUp linear forwards}
@keyframes floatUp{from{transform:translateY(0) scale(0);opacity:0}20%{opacity:1}to{transform:translateY(-110vh) scale(1.6);opacity:0}}
</style>
</head>
<body>
<div class="hearts"></div>
<div class="container">
<h1 class="title">To Angela ❤️</h1>
<p class="subtitle">A little piece of my heart for you ✨</p>

    <div class="slideshow">
        <img class="slide active" src="photo1.jpg" alt="Memory 1" />
        <img class="slide" src="photo2.jpg" alt="Memory 2" />
        <img class="slide" src="photo3.jpg" alt="Memory 3" />
        <img class="slide" src="photo4.jpg" alt="Memory 4" />
    </div>
    
<div class="letter">
  <div id="typedLetter"></div>
  <span id="cursor" class="cursor">|</span>
</div>
<button class="music-btn" onclick="toggleMusic()">🎵 Play Our Song</button>

<audio id="bgMusic" loop>
  <source src="Ed Sheeran - Photograph (Official Lyric Video) (1).mp3" type="audio/mpeg" />
</audio>

<footer>Forever yours 🌙</footer>
</div>

<script>
const music = document.getElementById("bgMusic");
const typedLetter = document.getElementById("typedLetter");
const cursor = document.getElementById("cursor");
const button = document.querySelector(".music-btn");
let playing = false;
let typingStarted = false;

const letterText = `
<strong>Dearest Angela ⭐,</strong><br><br>
I’ve been trying to find the right words to say before I leave, but my heart feels so full that it’s hard to get them all out.<br><br>
These past few days we’ve spent together, being so close to each other, have been some of the happiest moments of my life. Truly. Even when you were tired after your clinical, you still made time for me, and I am so full of gratitude for that. It reminds me how lucky I am. I’ve fallen for you so many times, the way you smell, our kisses, and the views we shared together while in love.<br><br>
All I want is for us to live together, but until that day comes, I will always keep you in my prayers and keep my promises to you. I know the distance is starting now, but even though I’m physically moving away, I am still right here with you. My heart isn’t going anywhere. I promise you that I am coming back for you.<br><br>
Please put your trust in me and in what we have. We are stronger than the miles between us.<br><br>
I love you truly, eii na yaam Nungshi my love, my Nungshibi.<br><br>
<strong>From your love,</strong><br>
Imna ❤️
`;

function typeHTML(html, element, speed = 35) {
  let i = 0;
  function type() {
    if (i >= html.length) {
      cursor.style.display = "none";
      return;
    }
    if (html[i] === "<") {
      const closeIndex = html.indexOf(">", i);
      if (closeIndex !== -1) {
        element.innerHTML += html.slice(i, closeIndex + 1);
        i = closeIndex + 1;
      }
    } else {
      element.innerHTML += html[i];
      i++;
    }
    element.parentNode.appendChild(cursor);
    setTimeout(type, speed);
  }
  type();
}

function toggleMusic() {
  if (!playing) {
    music.play();
    button.innerHTML = "⏸ Pause Music";
    playing = true;
    if (!typingStarted) {
      typingStarted = true;
      typeHTML(letterText, typedLetter, 35);
      startSlideshow();
    }
  } else {
    music.pause();
    button.innerHTML = "🎵 Play Our Song";
    playing = false;
  }
}


function startSlideshow() {
  const slides = document.querySelectorAll('.slide');
  if (!slides.length) return;
  let index = 0;

  function render() {
    slides.forEach(slide => {
      slide.classList.remove('active', 'prev', 'next');
    });
    slides[index].classList.add('active');
    slides[(index - 1 + slides.length) % slides.length].classList.add('prev');
    slides[(index + 1) % slides.length].classList.add('next');
  }

  render();
  setInterval(() => {
    index = (index + 1) % slides.length;
    render();
  }, 5000);
}

const heartsContainer = document.querySelector(".hearts");
function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  heart.style.animationDuration = (Math.random() * 4 + 6) + "s";
  heartsContainer.appendChild(heart);
  setTimeout(() => heart.remove(), 10000);
}
setInterval(createHeart, 300);
</script>
</body>
</html>
